name: Deploy marimo apps to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Export 8D Parallel Plot app
        run: |
          uvx marimo export html-wasm 0_Thermodynamic_Data_Tensor/8D_Parallel_Plot_Marimo.py -o _site/8D_ParallelPlot.html --mode run

      - name: Export MultiApp
        run: |
          uvx marimo export html-wasm 0_Thermodynamic_Data_Tensor/MultiAppTest.py -o _site/MultiApp.html --mode run

      - name: Export ML Predictions app
        run: |
          uvx marimo export html-wasm 3_ML_Model/Ablation_Calc_Marimo.py -o _site/ML_Predictions.html --mode run

      - name: Copy thermodynamic CSV files
        run: |
          cp -r 0_Thermodynamic_Data_Tensor/csv_files _site/csv_files

      - name: Copy ML data files
        run: |
          mkdir -p _site/MLDATA
          cp -r 3_ML_Model/MLDATA/* _site/MLDATA/

      - name: Check exported thermodynamic CSV files
        run: |
          echo "Checking CSV files:"
          find _site/csv_files -maxdepth 1 -type f | sort | head -40

      - name: Check exported ML data files
        run: |
          echo "Checking TEMP files:"
          find _site/MLDATA/TEMP -maxdepth 1 -type f | sort | head -40

          echo "Checking ETALIQ files:"
          find _site/MLDATA/ETALIQ -maxdepth 1 -type f | sort | head -40

          echo "Checking VEL files:"
          find _site/MLDATA/VEL -maxdepth 1 -type f | sort | head -40

          echo "Checking COMP files:"
          find _site/MLDATA/COMP -maxdepth 1 -type f | sort | head -40 || true

      - name: Create landing page
        run: |
          cat > _site/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>MultiComponentLaserAM Apps</title>
            <style>
              body {
                margin: 0;
                min-height: 100vh;
                font-family: Arial, Helvetica, sans-serif;
                background: linear-gradient(135deg, #f6f8fb, #e8edf5);
                display: flex;
                align-items: center;
                justify-content: center;
                color: #1f2937;
              }

              .container {
                max-width: 950px;
                width: 90%;
                background: white;
                border-radius: 20px;
                padding: 48px;
                box-shadow: 0 20px 50px rgba(0, 0, 0, 0.12);
                text-align: center;
              }

              h1 {
                margin-top: 0;
                font-size: 2.2rem;
              }

              p {
                font-size: 1.05rem;
                color: #4b5563;
                margin-bottom: 36px;
              }

              .buttons {
                display: flex;
                gap: 24px;
                justify-content: center;
                flex-wrap: wrap;
              }

              a.button {
                text-decoration: none;
                background: #111827;
                color: white;
                padding: 18px 30px;
                border-radius: 12px;
                font-size: 1.05rem;
                font-weight: 600;
                min-width: 220px;
                transition: transform 0.15s ease, box-shadow 0.15s ease;
              }

              a.button:hover {
                transform: translateY(-2px);
                box-shadow: 0 10px 25px rgba(0, 0, 0, 0.18);
              }

              .sub {
                margin-top: 32px;
                font-size: 0.9rem;
                color: #6b7280;
              }
            </style>
          </head>

          <body>
            <div class="container">
              <h1>MultiComponentLaserAM Web Apps</h1>
              <p>Select an interactive marimo app to open.</p>

              <div class="buttons">
                <a class="button" href="./8D_ParallelPlot.html">8D_ParallelPlot</a>
                <a class="button" href="./MultiApp.html">MultiApp</a>
                <a class="button" href="./ML_Predictions.html">ML Predictions</a>
              </div>

              <div class="sub">
                CoCrFeNi thermodynamic tensor visualization and ML prediction tools
              </div>
            </div>
          </body>
          </html>
          EOF

      - name: Disable Jekyll
        run: touch _site/.nojekyll

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4