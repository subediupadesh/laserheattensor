name: Deploy marimo apps to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Export 8D Parallel Plot app
        run: |
          uvx marimo export html-wasm 0_Thermodynamic_Data_Tensor/8D_Parallel_Plot_Marimo.py -o _site/8D_ParallelPlot.html --mode run

      - name: Export Sunburst Multi-Ring Chart app
        run: |
          uvx marimo export html-wasm 0_Thermodynamic_Data_Tensor/Sunburst_Multiring_Marimo.py -o _site/Sunburst_Multiring.html --mode run

      - name: Export MultiApp
        run: |
          uvx marimo export html-wasm 0_Thermodynamic_Data_Tensor/MultiAppTest.py -o _site/MultiApp.html --mode run

      - name: Export ML Predictions app
        run: |
          uvx marimo export html-wasm 3_ML_Model/Ablation_Calc_Marimo.py -o _site/ML_Predictions.html --mode run

      - name: Copy thermodynamic CSV files
        run: |
          cp -r 0_Thermodynamic_Data_Tensor/csv_files _site/csv_files
      - name: Create thermodynamic CSV manifest
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path("_site/csv_files")
          files = sorted(p.name for p in root.glob("Gibbs_*.csv"))

          with open(root / "manifest.json", "w", encoding="utf-8") as f:
              json.dump(files, f, indent=2)

          print(json.dumps(files, indent=2))
          PY
      - name: Copy ML data files
        run: |
          mkdir -p _site/MLDATA
          cp -r 3_ML_Model/MLDATA/* _site/MLDATA/

      - name: Create MLDATA manifest
        run: |
          python - <<'PY'
          import json
          import os

          root = "_site/MLDATA"
          fields = ["TEMP", "ETALIQ", "VEL", "COMP", "SIM_TIME"]

          manifest = {}
          for field in fields:
              folder = os.path.join(root, field)
              if os.path.isdir(folder):
                  manifest[field] = sorted(
                      f for f in os.listdir(folder)
                      if f.lower().endswith(".npy")
                  )
              else:
                  manifest[field] = []

          with open(os.path.join(root, "manifest.json"), "w", encoding="utf-8") as f:
              json.dump(manifest, f, indent=2)

          print(json.dumps(manifest, indent=2))
          PY

      - name: Check exported data files
        run: |
          echo "Checking _site:"
          ls -la _site

          echo "Checking CSV files:"
          find _site/csv_files -maxdepth 1 -type f | sort | head -40

          echo "Checking MLDATA manifest:"
          cat _site/MLDATA/manifest.json

          echo "Checking TEMP files:"
          find _site/MLDATA/TEMP -maxdepth 1 -type f | sort | head -40

          echo "Checking ETALIQ files:"
          find _site/MLDATA/ETALIQ -maxdepth 1 -type f | sort | head -40

          echo "Checking VEL files:"
          find _site/MLDATA/VEL -maxdepth 1 -type f | sort | head -40

          echo "Checking COMP files:"
          find _site/MLDATA/COMP -maxdepth 1 -type f | sort | head -40 || true

      - name: Create landing page
        run: |
          cat > _site/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>laserheattensor Apps</title>
            <style>
              body {
                margin: 0;
                min-height: 100vh;
                font-family: Arial, Helvetica, sans-serif;
                background: radial-gradient(circle at top left, #fff7ed, transparent 30%), linear-gradient(135deg, #eef2ff, #ecfeff);
                display: flex;
                align-items: center;
                justify-content: center;
                color: #1f2937;
              }

              .container {
                max-width: 950px;
                width: 90%;
                background: white;
                border-radius: 20px;
                padding: 48px;
                box-shadow: 0 24px 60px rgba(31, 41, 55, 0.14);
                text-align: center;
              }

              h1 {
                margin-top: 0;
                font-size: 2.2rem;
              }

              p {
                font-size: 1.05rem;
                color: #4b5563;
                margin-bottom: 36px;
              }

              .buttons {
                display: flex;
                gap: 24px;
                justify-content: center;
                flex-wrap: wrap;
              }

              a.button {
                text-decoration: none;
                color: white;
                padding: 18px 30px;
                border-radius: 16px;
                font-size: 1.05rem;
                font-weight: 700;
                min-width: 220px;
                transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
                box-shadow: 0 10px 25px rgba(31, 41, 55, 0.18);
              }

              a.button:nth-child(1) {
                background: linear-gradient(135deg, #2563eb, #7c3aed);
              }

              a.button:nth-child(2) {
                background: linear-gradient(135deg, #f97316, #facc15);
                color: #1f2937;
              }

              a.button:nth-child(3) {
                background: linear-gradient(135deg, #06b6d4, #10b981);
              }

              a.button:nth-child(4) {
                background: linear-gradient(135deg, #ec4899, #8b5cf6);
              }

              a.button:hover {
                transform: translateY(-3px) scale(1.02);
                filter: brightness(1.05);
                box-shadow: 0 14px 30px rgba(31, 41, 55, 0.26);
              }

              .sub {
                margin-top: 32px;
                font-size: 0.9rem;
                color: #6b7280;
              }
            </style>
          </head>

          <body>
            <div class="container">
              <h1>LaserHEATTENsor Web Apps</h1>
              <p>Select an interactive marimo app to open.</p>

              <div class="buttons">
                <a class="button" href="./8D_ParallelPlot.html">💡 8D TDT Viz</a>
                <a class="button" href="./Sunburst_Multiring.html">🌞 Multi-Ring Chart</a>
                <a class="button" href="./MultiApp.html">🧪 MultiAppTest</a>
                <a class="button" href="./ML_Predictions.html">🎛️ Attention Surrogate</a>
              </div>

              <div class="sub">
                CoCrFeNi thermodynamic tensor visualization and ML prediction tools
              </div>
            </div>
          </body>
          </html>
          EOF

      - name: Disable Jekyll
        run: touch _site/.nojekyll

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
