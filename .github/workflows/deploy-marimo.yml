name: Deploy marimo app to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Export marimo app
        run: |
          uvx marimo export html-wasm 0_Thermodynamic_Data_Tensor/GibbsEnergyViz_Marimo.py -o _site --mode run

      - name: Copy CSV files next to exported app
        run: |
          cp -r 0_Thermodynamic_Data_Tensor/csv_files _site/csv_files

      - name: Check exported files
        run: |
          echo "Checking _site contents:"
          ls -la _site
          echo "Checking CSV files:"
          ls -la _site/csv_files | head -40

      - name: Disable Jekyll
        run: touch _site/.nojekyll

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
